<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
 background: radial-gradient(circle at 20% 20%, #0a0f1f, #000);
 color:#00f0ff;
 overflow:hidden;
}

/* ANIMATED GRADIENT LAYER */
body::before{
 content:"";
 position:fixed;
 width:200%;
 height:200%;
 background: radial-gradient(circle, rgba(0,255,255,0.1), transparent 60%);
 animation:moveBG 20s infinite alternate;
}
@keyframes moveBG{
 0%{transform:translate(0,0);}
 100%{transform:translate(-25%, -25%);}
}

/* HEADER */
.header{
 text-align:center;
 padding:15px;
 letter-spacing:2px;
 opacity:0.9;
}

/* GRID */
.container{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:20px;
 padding:20px;
}

/* CARD */
.card{
 height:150px;
 border-radius:20px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(20px);
 border:1px solid rgba(255,255,255,0.1);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 gap:10px;
 cursor:pointer;
 transition:0.4s cubic-bezier(.2,.8,.2,1);
 position:relative;
 overflow:hidden;
}

/* CARD GLOW */
.card::before{
 content:"";
 position:absolute;
 width:200%;
 height:200%;
 background: radial-gradient(circle, rgba(0,255,255,0.2), transparent 60%);
 opacity:0;
 transition:0.4s;
}

.card:hover::before{
 opacity:1;
 transform:translate(-25%, -25%);
}

.card:hover{
 transform:translateY(-10px) scale(1.05);
 box-shadow:0 20px 60px rgba(0,255,255,0.4);
}

/* ICON */
.card img{
 width:60px;
 filter: drop-shadow(0 0 10px cyan);
}

/* WINDOW */
.window{
 position:absolute;
 top:80px;
 left:5%;
 width:90%;
 height:70%;
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(25px);
 border-radius:20px;
 border:1px solid rgba(0,255,255,0.3);
 display:flex;
 flex-direction:column;
 animation:openWin 0.3s ease;
}
@keyframes openWin{
 from{transform:scale(0.8);opacity:0;}
 to{transform:scale(1);opacity:1;}
}

.title-bar{
 display:flex;
 justify-content:space-between;
 padding:10px;
 background:rgba(0,255,255,0.2);
 border-radius:20px 20px 0 0;
 cursor:move;
}

/* DOCK */
#dock{
 position:fixed;
 bottom:15px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:15px;
 background:rgba(255,255,255,0.05);
 padding:12px 20px;
 border-radius:25px;
 backdrop-filter:blur(20px);
}

.dock-item{
 width:55px;height:55px;
 border-radius:15px;
 background:rgba(255,255,255,0.1);
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 transition:0.3s;
}

.dock-item:hover{
 transform:scale(1.3);
 box-shadow:0 0 25px cyan;
}

/* MIC */
#mic{
 position:fixed;
 right:20px;
 bottom:100px;
 width:65px;height:65px;
 border-radius:50%;
 background:rgba(0,0,0,0.6);
 border:2px solid cyan;
 display:flex;
 align-items:center;
 justify-content:center;
 cursor:pointer;
 animation:pulse 2s infinite;
}
@keyframes pulse{
 0%{box-shadow:0 0 10px cyan;}
 50%{box-shadow:0 0 40px cyan;}
 100%{box-shadow:0 0 10px cyan;}
}

/* GLOW CURSOR */
#glow{
 position:fixed;
 width:250px;height:250px;
 background:radial-gradient(circle, rgba(0,255,255,0.25), transparent);
 pointer-events:none;
}

/* LOGIN */
#login{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:999;
}
input{
 padding:10px;
 border:none;
 border-radius:10px;
 margin:10px;
}
button{
 padding:10px 20px;
 border:none;
 border-radius:10px;
 background:cyan;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="login">
<h2>Welcome to SKYRO</h2>
<input id="user" placeholder="Enter Name">
<button onclick="enter()">Enter</button>
</div>

<div id="glow"></div>

<div class="header">
<h2>SKYRO OS</h2>
<p>Futuristic Control Interface</p>
</div>

<div class="container">

<div class="card" onclick="openApp('Flipkart','https://flipkart.com')">
<img src="https://img.icons8.com/color/96/flipkart.png">
<span>Flipkart</span>
</div>

<div class="card" onclick="openApp('Maps','https://maps.google.com')">
<img src="https://img.icons8.com/color/96/google-maps.png">
<span>Maps</span>
</div>

<div class="card" onclick="openApp('Instagram','https://instagram.com')">
<img src="https://img.icons8.com/color/96/instagram-new.png">
<span>Instagram</span>
</div>

<div class="card" onclick="openApp('AWS','https://aws.amazon.com')">
<img src="https://img.icons8.com/color/96/amazon-web-services.png">
<span>AWS</span>
</div>

<div class="card" onclick="openNotes()">
<img src="https://img.icons8.com/color/96/note.png">
<span>Notes</span>
</div>

<div class="card" onclick="openApp('BGMI','https://bgmi.in')">
<img src="https://img.icons8.com/color/96/controller.png">
<span>BGMI</span>
</div>

</div>

<div id="dock">
<div class="dock-item" onclick="openNotes()">📝</div>
<div class="dock-item" onclick="lock()">🔒</div>
<div class="dock-item" onclick="location.reload()">🔄</div>
</div>

<div id="mic">🎤</div>

<script>
/* LOGIN */
function enter(){
 if(!user.value) return alert("Enter name");
 login.style.display="none";
 speak("Welcome "+user.value);
}

/* VOICE */
function speak(t){
 let s=new SpeechSynthesisUtterance(t);
 s.pitch=1.2;
 speechSynthesis.speak(s);
}

/* OPEN */
function openApp(name,url){
 speak("Opening "+name);
 window.open(url,"_blank");
}

/* NOTES */
function openNotes(){
 let w=document.createElement("div");
 w.className="window";
 w.innerHTML=`
 <div class="title-bar">
  <span>Notes</span>
  <span onclick="this.parentElement.parentElement.remove()">X</span>
 </div>
 <textarea style="flex:1;background:black;color:cyan;"></textarea>
 `;
 document.body.appendChild(w);
 drag(w);
}

/* DRAG */
function drag(el){
 let x=0,y=0,px=0,py=0;
 el.querySelector(".title-bar").onmousedown=e=>{
  px=e.clientX;py=e.clientY;
  document.onmousemove=e=>{
   x=px-e.clientX;
   y=py-e.clientY;
   px=e.clientX;py=e.clientY;
   el.style.top=(el.offsetTop-y)+"px";
   el.style.left=(el.offsetLeft-x)+"px";
  }
  document.onmouseup=()=>document.onmousemove=null;
 };
}

/* LOCK */
function lock(){login.style.display="flex";}

/* CURSOR GLOW */
document.addEventListener("mousemove",e=>{
 glow.style.left=e.clientX+"px";
 glow.style.top=e.clientY+"px";
});

/* VOICE COMMAND */
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
 let rec=new SR();
 mic.onclick=()=>{speak("Listening");rec.start();}
 rec.onresult=e=>{
  let c=e.results[0][0].transcript.toLowerCase();
  if(c.includes("flipkart")) openApp("Flipkart","https://flipkart.com");
  else if(c.includes("maps")) openApp("Maps","https://maps.google.com");
  else if(c.includes("instagram")) openApp("Instagram","https://instagram.com");
  else if(c.includes("aws")) openApp("AWS","https://aws.amazon.com");
  else if(c.includes("notes")) openNotes();
  else speak("Command not found");
 }
}
</script>

</body>
</html>
