<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS</title>

<style>
body {
  margin: 0;
  background: black;
  color: cyan;
  font-family: Arial;
}

/* HEADER */
.header {
  text-align: center;
  padding: 10px;
}

/* CARDS */
.container {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  height: 100px;
  border: 2px solid cyan;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  border-radius:10px;
}

.card:hover {
  box-shadow:0 0 20px cyan;
}

/* WINDOW */
.window {
  position: absolute;
  width: 90%;
  height: 70%;
  top: 60px;
  left: 5%;
  background: black;
  border: 2px solid cyan;
  display:flex;
  flex-direction:column;
}

.title-bar {
  background: cyan;
  color:black;
  padding:5px;
  display:flex;
  justify-content:space-between;
}

/* TASKBAR */
#taskbar {
  position: fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:black;
  border-top:1px solid cyan;
  display:flex;
}
.task-item {
  padding:5px 10px;
  background:cyan;
  color:black;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>SKYRO | BY SHASWAT</h2>
<p>appnexus . your digital citadel</p>
</div>

<div class="container">

<div class="card" onclick="openExternal('https://amazon.in','Amazon')">Amazon</div>
<div class="card" onclick="openExternal('https://flipkart.com','Flipkart')">Flipkart</div>
<div class="card" onclick="openExternal('https://swiggy.com','Swiggy')">Swiggy</div>
<div class="card" onclick="openExternal('https://zomato.com','Zomato')">Zomato</div>
<div class="card" onclick="openExternal('https://myntra.com','Myntra')">Myntra</div>

<div class="card" onclick="openCalculator()">Calculator</div>
<div class="card" onclick="openClock()">Clock</div>
<div class="card" onclick="openNotes()">Notes</div>

</div>

<div id="windows"></div>
<div id="taskbar"></div>

<script>

let appCount = 0;

/* SOUND */
function playClick(){
 const ctx = new AudioContext();
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value=500;
 gain.gain.value=0.1;
 osc.start();
 osc.stop(ctx.currentTime+0.05);
}

/* SPEAK */
function speak(text){
 speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* EXTERNAL APP */
function openExternal(url,name){
 playClick();
 speak("Opening " + name);
 window.open(url,"_blank");
}

/* NOTES */
function openNotes(){
 playClick();
 speak("Opening Notes");

 const win=document.createElement("div");
 const id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Notes</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>
 <textarea style="flex:1;background:black;color:cyan;"></textarea>
 `;

 document.getElementById("windows").appendChild(win);
 addTask(id,"Notes");
}

/* CALCULATOR */
let calc="";

function openCalculator(){
 playClick();
 speak("Opening Calculator");

 const win=document.createElement("div");
 const id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Calculator</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>

 <input id="display" style="width:100%;height:40px;background:black;color:cyan;text-align:right;" readonly>

 <div style="display:grid;grid-template-columns:repeat(4,1fr);">
 ${["7","8","9","/",
    "4","5","6","*",
    "1","2","3","-",
    "0",".","=","+"]
    .map(b=>`<button onclick="press('${b}')">${b}</button>`).join("")}
 </div>
 `;

 document.getElementById("windows").appendChild(win);
 addTask(id,"Calculator");
}

function press(v){
 if(v=="="){
  try{calc=eval(calc)}catch{calc="Error"}
 } else calc+=v;

 document.getElementById("display").value=calc;
}

/* CLOCK */
function openClock(){
 playClick();
 speak("Opening Clock");

 const win=document.createElement("div");
 const id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Clock</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>
 <div id="clock" style="font-size:40px;text-align:center;margin-top:20px;"></div>
 `;

 document.getElementById("windows").appendChild(win);
 addTask(id,"Clock");

 setInterval(()=>{
  const now=new Date().toLocaleTimeString();
  document.getElementById("clock").innerText=now;
 },1000);
}

/* TASKBAR */
function addTask(id,name){
 const t=document.createElement("div");
 t.className="task-item";
 t.innerText=name;
 t.onclick=()=>document.getElementById(id).style.display="block";
 document.getElementById("taskbar").appendChild(t);
}

/* CLOSE */
function closeApp(id){
 document.getElementById(id).remove();
}

</script>

</body>
</html>
