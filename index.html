<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skyro by Shaswat | AppNexus Citadel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #000105; --red: #ff003c; --aws: #FF9900; --glow: 0 0 50px rgba(0, 242, 255, 0.8); }
        body.nitro { --p: #ff003c; --glow: 0 0 80px rgba(255, 0, 60, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
        body, html { background: #000; color: var(--p); font-family: 'Orbitron', sans-serif; height: 100vh; overflow: hidden; perspective: 3000px; touch-action: manipulation; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .load-ring { width: 100px; height: 100px; border: 3px solid rgba(0, 242, 255, 0.1); border-top: 3px solid var(--p); border-radius: 50%; animation: spin 0.6s linear infinite; box-shadow: var(--glow); }

        #handshake { position: fixed; inset: 0; z-index: 90000; background: #000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .scanner { width: 220px; height: 220px; border: 5px double #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 1.5s infinite; cursor: pointer; position: relative; }
        .scan-line { position: absolute; width: 100%; height: 5px; background: #0f0; top: 0; animation: scan 2s infinite ease-in-out; box-shadow: 0 0 30px #0f0; }

        #ui-wrapper { position: fixed; inset: 0; z-index: 80000; display: none; opacity: 0; transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .glass { background: rgba(0, 10, 25, 0.85); border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); border-radius: 20px; }

        #container { display: grid; grid-template-columns: 350px 1fr; grid-template-rows: 150px 1fr; height: 100vh; padding: 25px; gap: 25px; }
        @media (max-width: 1000px) {
            #container { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; padding: 15px; }
            aside { grid-row: 3; height: 260px; overflow-y: auto; }
            .logo-text { font-size: 1.8rem !important; }
            .grid { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
            .action-btns { flex-direction: column; gap: 5px; }
        }

        header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .branding { display: flex; flex-direction: column; }
        .logo-text { font-size: 3rem; font-weight: 900; letter-spacing: 10px; text-shadow: var(--glow); text-transform: uppercase; }
        .tagline { font-size: 0.9rem; letter-spacing: 5px; opacity: 0.8; margin-top: 5px; color: var(--p); }

        .action-btns { display: flex; gap: 15px; }
        .top-btn { border: 2px solid var(--p); color: var(--p); padding: 10px 20px; font-weight: 900; background: transparent; cursor: pointer; font-family: 'Orbitron'; letter-spacing: 2px; transition: 0.3s; box-shadow: var(--glow); }
        .top-btn:active { transform: scale(0.95); background: var(--p); color: #000; }
        .nitro-btn { border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255,0,60,0.5); }
        .nitro-btn:active { background: var(--red); color: #fff; }

        aside { display: flex; flex-direction: column; overflow: hidden; }
        #speedo-wrap { padding: 20px; text-align: center; border-bottom: 1px solid rgba(0,242,255,0.1); }
        .gauge-val { font-size: 3.5rem; font-weight: 900; text-shadow: var(--glow); }

        .hud-module { padding: 15px 20px; border-bottom: 1px solid rgba(0,242,255,0.1); font-family: 'Source Code Pro'; }
        .hud-label { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
        .hud-val { font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; }
        .stat-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-top: 8px; position: relative; overflow: hidden; }
        .stat-fill { position: absolute; top:0; left:0; height:100%; background: var(--p); box-shadow: var(--glow); transition: 0.5s; }

        /* ANALOG CLOCK & WEATHER CSS ADDED */
        .analog-wrapper { display: flex; justify-content: space-between; align-items: center; }
        .analog-clock { width: 35px; height: 35px; border: 2px solid var(--p); border-radius: 50%; position: relative; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: var(--p); transform: translateX(-50%); border-radius: 2px; }
        .hour { width: 2px; height: 8px; background: #fff; }
        .minute { width: 2px; height: 12px; background: rgba(255,255,255,0.7); }
        .second { width: 1px; height: 15px; background: var(--red); }
        .center-dot { width: 4px; height: 4px; background: var(--red); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }

        main { position: relative; overflow-y: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 25px; padding: 25px; transform-style: preserve-3d; }
        .card { padding: 40px; text-align: center; transition: 0.5s; transform-style: preserve-3d; background: rgba(0, 242, 255, 0.04); border: 2px solid rgba(0, 242, 255, 0.15); border-radius: 10px 40px; cursor: pointer; }
        .card:hover { border-color: var(--p); transform: translateZ(80px) rotateY(10deg); box-shadow: var(--glow); }
        .card-label { font-size: 1.4rem; font-weight: 900; margin-top: 15px; letter-spacing: 2px; }

        .back-btn { position: absolute; top: 30px; left: 30px; padding: 15px 45px; border: 3px solid var(--p); background: #000; color: var(--p); font-weight: 900; text-decoration: none; box-shadow: var(--glow); z-index: 1000; }

        .open-btn { 
            display: inline-block; padding: 20px 60px; border: 4px solid var(--p); 
            background: transparent; color: var(--p); font-weight: 900; font-size: 1.5rem; 
            letter-spacing: 8px; border-radius: 0 50px; transition: 0.2s; box-shadow: var(--glow); 
            text-decoration: none; position: relative; overflow: hidden;
        }
        .open-btn:active { background: var(--p); color: #000; transform: scale(0.9); box-shadow: 0 0 100px var(--p); }

        .viewport-3d { width: 380px; height: 380px; transform-style: preserve-3d; position: relative; }
        .reactor-core { width: 100%; height: 100%; border-radius: 50%; border: 12px solid var(--p); animation: hyperSpin 4s linear infinite; box-shadow: var(--glow), inset var(--glow); position: absolute; }
        
        #spark-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 100000; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes hyperSpin { from { transform: rotateY(0) rotateX(70deg); } to { transform: rotateY(360deg) rotateX(70deg); } }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 30px #0f0; } 50% { box-shadow: 0 0 80px #0f0; transform: scale(1.03); } }

        /* --- NEW SCI-FI OS MODULE CSS --- */
        .radar-box { width: 100%; height: 70px; border: 1px solid rgba(0,242,255,0.2); border-radius: 10px; position: relative; overflow: hidden; background: radial-gradient(circle, rgba(0,242,255,0.1) 0%, #000 70%); margin-top: 5px; }
        .radar-sweep { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent 70%, rgba(0,242,255,0.8) 100%); transform-origin: 0 0; animation: radarSpin 2s linear infinite; }
        .radar-blip { position: absolute; width: 4px; height: 4px; background: #0f0; border-radius: 50%; top: 40%; left: 60%; box-shadow: 0 0 10px #0f0; animation: blipPulse 2s infinite; }
        @keyframes radarSpin { from { transform: rotate(0deg) translate(-50%, -50%); } to { transform: rotate(360deg) translate(-50%, -50%); } }
        @keyframes blipPulse { 0%, 100% { opacity: 0; } 50% { opacity: 1; transform: scale(1.5); } }
        
        body.protocol-zero { --p: #ff0000; --glow: 0 0 80px #ff0000; animation: pzShake 0.4s infinite; filter: contrast(120%); }
        @keyframes pzShake { 0% { transform: translate(2px, 1px) rotate(0deg); } 25% { transform: translate(-1px, -2px) rotate(-1deg); } 50% { transform: translate(-3px, 0px) rotate(1deg); } 75% { transform: translate(3px, 2px) rotate(0deg); } 100% { transform: translate(1px, -1px) rotate(-1deg); } }
    </style>
</head>
<body onload="initSystem()">

    <canvas id="spark-canvas"></canvas>

    <div id="holo-container" style="position:fixed; inset:0; pointer-events:none; z-index:85000;"></div>
    
    <div id="pz-trigger" style="position:fixed; bottom:0; right:0; width:30px; height:30px; z-index:100000; cursor:crosshair;" ondblclick="triggerProtocolZero()"></div>

    <div id="loader">
        <div class="load-ring"></div>
        <div style="margin-top:30px; font-family:'Source Code Pro'; letter-spacing:8px; font-size:0.7rem;">CALIBRATING VOCAL MATRICES...</div>
    </div>

    <div id="handshake" onclick="boot()">
        <div class="scanner"><div class="scan-line"></div></div>
        <div style="margin-top:40px; color:#0f0; font-size:1.2rem; letter-spacing:8px; font-weight:900; text-align:center;">ARCHITECT: SHASWAT MOHANTY</div>
    </div>

    <canvas id="nebula" style="position:fixed; inset:0; z-index:0; background:#000;"></canvas>

    <div id="ui-wrapper">
        <div id="container">
            <header class="glass">
                <div class="branding">
                    <div class="logo-text">Skyro | <span style="font-weight:300; opacity:0.7;">by Shaswat</span></div>
                    <div class="tagline">appnexus : your digital citadel</div>
                </div>
                <div class="action-btns">
                    <button class="top-btn" onclick="startVoiceCommand()">🎙️ VOICE UPLINK</button>
                    <button class="top-btn nitro-btn" onclick="toggleNitro()">NITRO</button>
                </div>
            </header>
            <aside class="glass" style="overflow-y:auto;">
                <div id="speedo-wrap">
                    <div class="gauge-val" id="speedo">000</div>
                    <div style="letter-spacing:5px; opacity:0.6; font-size:0.7rem;">MACH VELOCITY</div>
                </div>

                <div class="hud-module">
                    <div class="hud-label">Temporal Matrix</div>
                    <div class="analog-wrapper">
                        <div class="hud-val" id="clock">00:00:00</div>
                        <div class="analog-clock">
                            <div class="hand hour" id="h-hand"></div>
                            <div class="hand minute" id="m-hand"></div>
                            <div class="hand second" id="s-hand"></div>
                            <div class="center-dot"></div>
                        </div>
                    </div>
                </div>

                <div class="hud-module">
                    <div class="hud-label">Atmospheric Sensors</div>
                    <div class="weather-grid">
                        <div><div style="font-size:0.5rem; opacity:0.6; letter-spacing:2px;">TEMP</div><div class="hud-val" id="temp-val">--°C</div></div>
                        <div><div style="font-size:0.5rem; opacity:0.6; letter-spacing:2px;">AQI</div><div class="hud-val" id="aqi-val" style="color: #00ff66;">--</div></div>
                    </div>
                    <div id="weather-loc" style="font-size:0.6rem; opacity:0.6; margin-top:8px; letter-spacing:2px;">AWAITING SATELLITE...</div>
                </div>
                
                <div class="hud-module">
                    <div class="hud-label">Global Radar</div>
                    <div class="radar-box">
                        <div class="radar-sweep"></div>
                        <div class="radar-blip"></div>
                    </div>
                </div>

                <div class="hud-module">
                    <div class="hud-label">Vitality HUD</div>
                    <div class="hud-val" id="batt-txt">100%</div>
                    <div class="stat-bar"><div class="stat-fill" id="batt-bar" style="width: 100%;"></div></div>
                </div>

                <div class="hud-module">
                    <div class="hud-label">Network Uplink</div>
                    <div class="hud-val" id="net-txt">STABLE</div>
                </div>

                <div id="terminal" style="flex-grow:1; padding:20px; font-family:'Source Code Pro'; font-size:0.6rem; line-height:2; opacity: 0.5;"></div>
            </aside>
            <main class="glass" id="viewport"></main>
        </div>
    </div>

    <script>
        const nodes = [
            { id: 'mk3', name: 'MARK 3', icon: '▶', color: '#ff0000', link: 'https://youtube.com', label: 'YouTube' },
            { id: 'mk4', name: 'MARK 4', icon: '🚀', color: '#00ff66', link: 'https://play.google.com', label: 'Play Store' },
            { id: 'mk5', name: 'MARK 5', icon: '🏁', color: '#ffaa00', link: 'https://www.pubgmobile.com', label: 'PUBG' },
            { id: 'mk50', name: 'MARK 50', icon: '📷', color: '#b300ff', link: 'https://instagram.com', label: 'Instagram' },
            { id: 'mk85', name: 'MARK 85', icon: '💎', color: '#ffffff', link: 'https://flipkart.com', label: 'Flipkart' },
            { id: 'mk7', name: 'MARK 7', icon: '☁️', color: '#FF9900', link: 'https://console.aws.amazon.com', label: 'AWS Console' },
            { id: 'mk1', name: 'MARK 1', icon: '📡', color: '#00f2ff', link: 'https://maps.google.com', label: 'Google Maps' },
            { id: 'apex', name: 'APEX', icon: '⚛', color: '#00f2ff', link: '#', label: 'Architect' }
        ];

        let active = 'home', isNitro = false, speed = 0, targetSpeed = 0, audioCtx;
        const sCanvas = document.getElementById('spark-canvas'), sCtx = sCanvas.getContext('2d');
        let sparks = [];

        /* AI VOICE COMMAND (SPEECH RECOGNITION) LOGIC */
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                const command = event.results[0][0].transcript.toLowerCase();
                log(`MIC DETECTED: "${command}"`);
                
                if (command.includes("open youtube")) navigate('mk3');
                else if (command.includes("open play store")) navigate('mk4');
                else if (command.includes("open pubg")) navigate('mk5');
                else if (command.includes("open instagram")) navigate('mk50');
                else if (command.includes("open flipkart")) navigate('mk85');
                else if (command.includes("open aws")) navigate('mk7');
                else if (command.includes("open maps") || command.includes("open google maps")) navigate('mk1');
                else if (command.includes("open architect") || command.includes("open apex")) navigate('apex');
                else {
                    speak("Command not recognized, Boss. Please try again.");
                }
            };
            recognition.onerror = function(event) { log(`VOICE ERROR: ${event.error}`); };
        }

        function startVoiceCommand() {
            if (!recognition) {
                speak("Voice uplink is not supported by this browser.");
                log("SYS_ERR: WebKit Speech Recognition missing.");
                return;
            }
            playSound(1000); speak("Listening for directive.");
            setTimeout(() => { recognition.start(); }, 1200); 
        }

        async function fetchAtmosphere() {
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                const lat = geoData.latitude || 17.385;
                const lon = geoData.longitude || 78.4867;
                
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const wData = await wRes.json();
                document.getElementById('temp-val').innerText = wData.current_weather.temperature + "°C";
                
                const aRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=us_aqi`);
                const aData = await aRes.json();
                const aqi = aData.current.us_aqi;
                
                const aqiEl = document.getElementById('aqi-val');
                aqiEl.innerText = aqi;
                if(aqi < 50) aqiEl.style.color = '#00ff66';
                else if(aqi < 100) aqiEl.style.color = 'var(--aws)';
                else aqiEl.style.color = 'var(--red)';

                document.getElementById('weather-loc').innerText = `LOC: ${geoData.city ? geoData.city.toUpperCase() : 'UPLINK'} | ACTIVE`;
                log("SATELLITE: Weather & AQI Synced.");
            } catch(e) {
                document.getElementById('weather-loc').innerText = "SATELLITE OFFLINE";
                log("SYS_ERR: Atmospheric sensors failed.");
            }
        }

        function updateHUD() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
            
            const h = now.getHours() % 12; const m = now.getMinutes(); const s = now.getSeconds();
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${(h * 30) + (m * 0.5)}deg)`;
            document.getElementById('m-hand').style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            document.getElementById('s-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;

            if(navigator.getBattery) {
                navigator.getBattery().then(b => {
                    const level = Math.floor(b.level * 100);
                    document.getElementById('batt-txt').innerText = level + "%";
                    document.getElementById('batt-bar').style.width = level + "%";
                });
            }
            document.getElementById('net-txt').innerText = navigator.onLine ? "SECURE" : "OFFLINE";
            document.getElementById('net-txt').style.color = navigator.onLine ? "var(--p)" : "var(--red)";
        }
        setInterval(updateHUD, 1000);

        function playSound(f) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.04, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
        }

        function createSparks(e) {
            if(!e) return;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : window.innerWidth/2);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : window.innerHeight/2);
            const color = getComputedStyle(document.body).getPropertyValue('--p');
            for(let i=0; i<60; i++) {
                sparks.push({ x, y, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30, life: 1.0, color: color, size: Math.random()*4 + 1 });
            }
        }

        function updateSparks() {
            sCtx.clearRect(0,0,sCanvas.width,sCanvas.height);
            sparks.forEach((s, i) => {
                s.x += s.vx; s.y += s.vy; s.life -= 0.025;
                if(s.life <= 0) sparks.splice(i, 1);
                sCtx.fillStyle = s.color; sCtx.globalAlpha = s.life;
                sCtx.fillRect(s.x, s.y, s.size, s.size);
            }); requestAnimationFrame(updateSparks);
        }

        function speak(t) { 
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(t); u.pitch = 0.8; u.rate = 1; 
            window.speechSynthesis.speak(u); 
        }

        function initSystem() {
            const dpr = window.devicePixelRatio || 1;
            sCanvas.width = window.innerWidth * dpr; sCanvas.height = window.innerHeight * dpr;
            sCtx.scale(dpr, dpr);
            initSpace(); updateSparks();
            fetchAtmosphere(); 
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('handshake').style.display = 'flex'; }, 1200);
        }

        function boot() {
            playSound(600); 
            speak("Welcome to SKYRO by Shaswat. All systems are operational.");
            document.getElementById('handshake').style.display='none';
            document.getElementById('ui-wrapper').style.display='block';
            setTimeout(()=>document.getElementById('ui-wrapper').style.opacity='1', 100);
            render();
        }

        function toggleNitro() {
            playSound(1000); isNitro = !isNitro; document.body.classList.toggle('nitro');
            if(isNitro) speak("Nitro engaged.");
        }

        let canvas, ctx, parts = [];
        function initSpace() {
            canvas = document.getElementById('nebula'); ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<300; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, z:Math.random()*canvas.width, l:Math.random()*60});
            animate();
            
            // NEW: SENTIENT CORE MOUSE TRACKING
            window.addEventListener('mousemove', (e) => {
                targetSpeed = Math.abs(e.movementX + e.movementY) * 2;
                if(active === 'home') {
                    const g = document.querySelector('.grid');
                    if(g) g.style.transform = `rotateY(${(window.innerWidth/2-e.clientX)/25}deg) rotateX(${-(window.innerHeight/2-e.clientY)/25}deg)`;
                } else {
                    const eye = document.querySelector('.eye-socket');
                    if(eye) {
                        const xAxis = (window.innerWidth / 2 - e.pageX) / 10;
                        const yAxis = (window.innerHeight / 2 - e.pageY) / 10;
                        eye.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                    }
                }
            });
        }

        function animate() {
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
            speed += (targetSpeed - speed) * 0.1;
            let m = isNitro ? (speed + 400) : speed;
            document.getElementById('speedo').innerText = Math.floor(m).toString().padStart(3, '0');
            targetSpeed *= 0.95;
            parts.forEach(p => {
                p.z -= (isNitro ? 60 : 15 + speed/5); if(p.z<=0) p.z=canvas.width;
                const sx = (p.x - canvas.width/2) * (canvas.width/p.z) + canvas.width/2;
                const sy = (p.y - canvas.height/2) * (canvas.width/p.z) + canvas.height/2;
                const s = (1 - p.z/canvas.width);
                ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--p');
                ctx.lineWidth = s * 6; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + (s*p.l*(isNitro?20:4)), sy); ctx.stroke();
            }); requestAnimationFrame(animate);
        }

        function log(msg) { const t = document.getElementById('terminal'), d = document.createElement('div'); d.innerHTML = `> ${msg}`; t.prepend(d); }

        function navigate(id) { playSound(800); active = id; render(); }

        /* NEW: HOLO-PANEL OS WINDOW LOGIC */
        function openHoloPanel(url, title) {
            playSound(1100);
            const container = document.getElementById('holo-container');
            const pId = 'holo-' + Math.random().toString(36).substr(2, 9);
            
            const panel = document.createElement('div');
            panel.className = 'glass';
            panel.id = pId;
            panel.style.position = 'absolute';
            panel.style.top = '15%'; panel.style.left = '30%';
            panel.style.width = '60%'; panel.style.height = '70%';
            panel.style.pointerEvents = 'auto';
            panel.style.display = 'flex'; panel.style.flexDirection = 'column';
            panel.style.boxShadow = 'var(--glow)';
            panel.style.border = '2px solid var(--p)';
            
            panel.innerHTML = `
                <div class="holo-header" style="padding:15px; background:rgba(0,242,255,0.1); cursor:grab; display:flex; justify-content:space-between; font-weight:900; border-bottom:1px solid var(--p); color:var(--p);">
                    <span>[SYS_UPLINK] :: ${title.toUpperCase()}</span>
                    <span style="cursor:pointer; color:var(--red);" onclick="document.getElementById('${pId}').remove(); playSound(800);">[ TERMINATE ]</span>
                </div>
                <div style="flex-grow:1; position:relative;">
                    <iframe src="${url}" style="width:100%; height:100%; border:none; background:#fff;"></iframe>
                    <div style="position:absolute; bottom:10px; right:10px; font-size:0.7rem; background:#000; padding:5px; border: 1px solid var(--p);">
                        <a href="${url}" target="_blank" style="color:var(--p); text-decoration:none; font-weight:900;">UPLINK BLOCKED? [FORCE SECURE ROUTE]</a>
                    </div>
                </div>
            `;
            container.appendChild(panel);
            
            // Drag Logic
            const header = panel.querySelector('.holo-header');
            let isDragging = false, startX, startY, startLeft, startTop;
            
            header.addEventListener('mousedown', (e) => {
                isDragging = true; startX = e.clientX; startY = e.clientY;
                startLeft = parseInt(panel.style.left, 10) || panel.offsetLeft;
                startTop = parseInt(panel.style.top, 10) || panel.offsetTop;
                header.style.cursor = 'grabbing';
            });
            window.addEventListener('mousemove', (e) => {
                if(!isDragging) return;
                panel.style.left = startLeft + (e.clientX - startX) + 'px';
                panel.style.top = startTop + (e.clientY - startY) + 'px';
            });
            window.addEventListener('mouseup', () => { isDragging = false; header.style.cursor = 'grab'; });
        }

        /* NEW: PROTOCOL ZERO LOCKDOWN LOGIC */
        let pzActive = false;
        function triggerProtocolZero() {
            if(pzActive) return;
            pzActive = true;
            document.body.classList.add('protocol-zero');
            playSound(150); playSound(200);
            speak("Warning. Unauthorized access detected. Initiating Protocol Zero. Citadel Lockdown engaged.");
            
            document.querySelectorAll('.card-label, .hud-label, .gauge-val, .logo-text, .tagline').forEach(el => {
                el.dataset.orig = el.innerText;
                el.innerText = scrambleText(el.innerText);
            });

            setTimeout(() => {
                let code = prompt("CITADEL LOCKED. ENTER ARCHITECT OVERRIDE CODE:");
                if(code && (code.toUpperCase() === "SHASWAT" || code.toUpperCase() === "BOSS")) {
                    pzActive = false;
                    document.body.classList.remove('protocol-zero');
                    speak("Override accepted. Welcome back, Architect.");
                    document.querySelectorAll('[data-orig]').forEach(el => el.innerText = el.dataset.orig);
                } else {
                    pzActive = false;
                    triggerProtocolZero(); // Infinite Loop if wrong
                }
            }, 5000);
        }
        function scrambleText(txt) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            return txt.split('').map(c => c === ' ' ? ' ' : chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        function render() {
            const v = document.getElementById('viewport');
            log(`STARK_LINK: ${active.toUpperCase()}`);
            if(active === 'home') {
                v.innerHTML = `<div class="grid">${nodes.map(n => `<div class="card" onclick="navigate('${n.id}')"><span style="font-size:4.5rem;display:block;color:${n.color}">${n.icon}</span><div class="card-label" style="color:${n.color}">${n.label}</div></div>`).join('')}</div>`;
            } else {
                const n = nodes.find(x => x.id === active);
                speak(`Opening ${n.label}.`);
                // Sentient Eye-Socket wrapper added here
                let content = active === 'apex' 
                    ? `<div style="font-size:3rem;font-weight:900;text-align:center;line-height:1.5;">DESIGNED AND CREATED<br>BY<br>SHASWAT MOHANTY</div>` 
                    : `<div class="viewport-3d" style="perspective:1000px;">
                           <div class="eye-socket" style="width:100%;height:100%;transition:transform 0.1s ease-out;transform-style:preserve-3d;">
                               <div class="reactor-core"></div>
                           </div>
                       </div>
                       <h1 style="font-size:4.5rem;text-shadow:0 0 50px ${n.color};">${n.name}</h1>
                       <a href="#" class="open-btn" style="border-color:${n.color};color:${n.color}" onclick="openHoloPanel('${n.link}', '${n.name}'); createSparks(event); return false;">OPEN ${n.label.toUpperCase()}</a>`;
                v.innerHTML = `<a href="#" class="back-btn" onclick="navigate('home')">BACK</a><div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">${content}</div>`;
            }
        }
    </script>
</body>
</html>
