<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS</title>

<style>
body{
 margin:0;
 font-family: 'Segoe UI', sans-serif;
 background:black;
 color:cyan;
 overflow:hidden;
}

/* BOOT SCREEN */
#boot{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 color:cyan;
 z-index:99999;
 animation:fadeOut 3s forwards;
 animation-delay:2s;
}
@keyframes fadeOut{
 to{opacity:0;visibility:hidden;}
}

/* LOGIN */
#loginScreen{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:9999;
}

/* BACKGROUND */
#bgCanvas{
 position:fixed;
 width:100%;
 height:100%;
 z-index:-1;
}

/* HEADER */
.header{
 text-align:center;
 margin-top:10px;
}

/* CARDS */
.container{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 height:120px;
 border-radius:16px;
 backdrop-filter: blur(15px);
 background: rgba(0,255,255,0.05);
 border:1px solid rgba(0,255,255,0.3);
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 position:relative;
 overflow:hidden;
 transition:0.3s;
}

.card::before{
 content:"";
 position:absolute;
 width:200%;
 height:200%;
 background:linear-gradient(45deg,transparent,cyan,transparent);
 animation:rotate 4s linear infinite;
}
@keyframes rotate{
 0%{transform:rotate(0deg);}
 100%{transform:rotate(360deg);}
}

.card::after{
 content:"";
 position:absolute;
 inset:2px;
 background:black;
 border-radius:14px;
}

.card span{
 position:relative;
 z-index:2;
}

.card:hover{
 transform:scale(1.08);
 box-shadow:0 0 40px cyan;
}

/* WINDOWS */
.window{
 position:absolute;
 width:90%;
 height:70%;
 top:60px;
 left:5%;
 backdrop-filter: blur(20px);
 background:rgba(0,0,0,0.6);
 border:1px solid rgba(0,255,255,0.4);
 border-radius:14px;
 display:flex;
 flex-direction:column;
 box-shadow:0 0 40px rgba(0,255,255,0.3);
}

.title-bar{
 background:rgba(0,255,255,0.8);
 color:black;
 padding:6px;
 display:flex;
 justify-content:space-between;
 cursor:move;
}

/* DOCK */
#dock{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:10px;
 background:rgba(0,0,0,0.5);
 padding:10px;
 border-radius:20px;
 backdrop-filter:blur(10px);
}

.dock-item{
 width:50px;
 height:50px;
 background:cyan;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 transition:0.3s;
}

.dock-item:hover{
 transform:scale(1.3);
 box-shadow:0 0 20px cyan;
}

/* MIC */
#micBtn{
 position:fixed;
 right:20px;
 bottom:90px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:black;
 border:2px solid cyan;
 color:cyan;
 cursor:pointer;
 animation:pulse 2s infinite;
}

@keyframes pulse{
 0%{box-shadow:0 0 10px cyan;}
 50%{box-shadow:0 0 40px cyan;}
 100%{box-shadow:0 0 10px cyan;}
}

/* GLOW */
#glow{
 position:fixed;
 width:250px;
 height:250px;
 background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
 pointer-events:none;
}
</style>
</head>

<body>

<div id="boot">
<h1>SKYRO OS</h1>
<p>Initializing System...</p>
</div>

<div id="loginScreen">
<h2>Login</h2>
<input id="username" placeholder="Enter Username">
<button onclick="login()">Enter</button>
</div>

<canvas id="bgCanvas"></canvas>
<div id="glow"></div>

<div class="header">
<h2>SKYRO</h2>
<p>Appnexus Interface</p>
</div>

<div class="container">
<div class="card" onclick="openExternal('https://flipkart.com','Flipkart')"><span>Flipkart</span></div>
<div class="card" onclick="openExternal('https://maps.google.com','Maps')"><span>Maps</span></div>
<div class="card" onclick="openExternal('https://instagram.com','Instagram')"><span>Instagram</span></div>
<div class="card" onclick="openExternal('https://aws.amazon.com','AWS')"><span>AWS</span></div>
<div class="card" onclick="openExternal('https://bgmi.in','BGMI')"><span>BGMI</span></div>
<div class="card" onclick="openNotes()"><span>Notes</span></div>
<div class="card" onclick="openExternal('https://cricbuzz.com','Cricbuzz')"><span>Cricbuzz</span></div>
</div>

<div id="dock">
<div class="dock-item" onclick="openNotes()">📝</div>
<div class="dock-item" onclick="lockSystem()">🔒</div>
<div class="dock-item" onclick="location.reload()">🔄</div>
</div>

<button id="micBtn">🎤</button>

<div id="windows"></div>

<script>
let appCount=0;

/* SOUND */
function playClick(){
 let ctx=new AudioContext();
 let osc=ctx.createOscillator();
 let gain=ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value=500;
 gain.gain.value=0.1;
 osc.start();
 osc.stop(ctx.currentTime+0.05);
}

/* VOICE */
function speak(t){
 speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* LOGIN */
function login(){
 let u=document.getElementById("username").value;
 if(!u) return alert("Enter username");
 localStorage.setItem("user",u);
 document.getElementById("loginScreen").style.display="none";
 speak("Welcome "+u);
}

/* LOCK */
function lockSystem(){
 document.getElementById("loginScreen").style.display="flex";
}

/* EXTERNAL */
function openExternal(url,name){
 playClick();
 speak("Opening "+name);
 window.open(url,"_blank");
}

/* NOTES */
function openNotes(){
 playClick();
 speak("Opening Notes");

 let win=document.createElement("div");
 let id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Notes</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>
 <textarea id="notesArea" style="flex:1;background:black;color:cyan;"></textarea>
 <button onclick="saveNotes()">Save</button>
 `;

 document.body.appendChild(win);
 drag(win);
 setTimeout(loadNotes,100);
}

function saveNotes(){
 localStorage.setItem("notes",document.getElementById("notesArea").value);
 speak("Saved");
}
function loadNotes(){
 let d=localStorage.getItem("notes");
 if(d) document.getElementById("notesArea").value=d;
}

/* DRAG */
function drag(el){
 let pos1=0,pos2=0,pos3=0,pos4=0;
 el.querySelector(".title-bar").onmousedown=e=>{
  pos3=e.clientX;pos4=e.clientY;
  document.onmousemove=dragMove;
  document.onmouseup=()=>document.onmousemove=null;
 };
 function dragMove(e){
  pos1=pos3-e.clientX;
  pos2=pos4-e.clientY;
  pos3=e.clientX;
  pos4=e.clientY;
  el.style.top=(el.offsetTop-pos2)+"px";
  el.style.left=(el.offsetLeft-pos1)+"px";
 }
}

/* BACKGROUND */
let canvas=document.getElementById("bgCanvas");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
 stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2,speed:Math.random()*0.5});
}

function animate(){
 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 stars.forEach(s=>{
  ctx.beginPath();
  ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();
  s.y+=s.speed;
  if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;}
 });

 requestAnimationFrame(animate);
}
animate();

/* GLOW */
document.addEventListener("mousemove",e=>{
 let g=document.getElementById("glow");
 g.style.left=e.clientX+"px";
 g.style.top=e.clientY+"px";
});

/* VOICE */
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
 let rec=new SR();
 document.getElementById("micBtn").onclick=()=>{
  speak("Listening");
  rec.start();
 };
 rec.onresult=e=>{
  let c=e.results[0][0].transcript.toLowerCase();
  if(c.includes("flipkart")) openExternal("https://flipkart.com","Flipkart");
  else if(c.includes("maps")) openExternal("https://maps.google.com","Maps");
  else if(c.includes("instagram")) openExternal("https://instagram.com","Instagram");
  else if(c.includes("aws")) openExternal("https://aws.amazon.com","AWS");
  else if(c.includes("bgmi")) openExternal("https://bgmi.in","BGMI");
  else if(c.includes("notes")) openNotes();
  else speak("Command not recognized");
 };
}
</script>

</body>
</html>
