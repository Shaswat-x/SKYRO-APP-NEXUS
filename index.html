<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:cyan;
  overflow:hidden;
}

/* LOGIN */
#loginScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

/* BG */
#bgCanvas{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

/* HEADER */
.header{text-align:center;padding:10px;}

/* CARDS */
.container{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
height:110px;
border:2px solid cyan;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
border-radius:10px;
}
.card:hover{
box-shadow:0 0 30px cyan;
transform:scale(1.05);
}

/* WINDOW */
.window{
position:absolute;
width:90%;
height:70%;
top:60px;
left:5%;
background:black;
border:2px solid cyan;
display:flex;
flex-direction:column;
}
.title-bar{
background:cyan;
color:black;
padding:5px;
display:flex;
justify-content:space-between;
cursor:move;
}

/* TASKBAR */
#taskbar{
position:fixed;
bottom:0;
width:100%;
height:40px;
background:black;
display:flex;
border-top:1px solid cyan;
}
.task-item{
margin:5px;
padding:5px 10px;
background:cyan;
color:black;
cursor:pointer;
}

/* BUTTONS */
#micBtn,#toggleTaskbar,#lockBtn{
position:fixed;
background:black;
color:cyan;
border:1px solid cyan;
cursor:pointer;
}
#micBtn{right:20px;bottom:70px;width:60px;height:60px;border-radius:50%;}
#toggleTaskbar{bottom:50px;left:10px;}
#lockBtn{top:10px;right:10px;}

/* GLOW */
#glow{
position:fixed;
width:250px;height:250px;
background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
pointer-events:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h1>SKYRO OS</h1>
<input id="username" placeholder="Enter Username">
<br><br>
<button onclick="login()">Login</button>
</div>

<canvas id="bgCanvas"></canvas>
<div id="glow"></div>

<button id="micBtn">🎤</button>
<button id="toggleTaskbar">Taskbar</button>
<button id="lockBtn" onclick="lockSystem()">🔒</button>

<div class="header">
<h2>SKYRO | BY SHASWAT</h2>
<p>appnexus . your digital citadel</p>
</div>

<div class="container">
<div class="card" onclick="openExternal('https://flipkart.com','Flipkart')">Flipkart</div>
<div class="card" onclick="openExternal('https://maps.google.com','Google Maps')">Maps</div>
<div class="card" onclick="openExternal('https://instagram.com','Instagram')">Instagram</div>
<div class="card" onclick="openExternal('https://aws.amazon.com/console','AWS')">AWS</div>
<div class="card" onclick="openExternal('https://bgmi.in','BGMI')">BGMI</div>
<div class="card" onclick="openNotes()">Skyro Notes</div>
<div class="card" onclick="openExternal('https://cricbuzz.com','Cricbuzz')">Cricbuzz</div>
</div>

<div id="windows"></div>
<div id="taskbar"></div>

<script>
let appCount=0;

/* SOUND */
function playClick(){
 let ctx=new AudioContext();
 let osc=ctx.createOscillator();
 let gain=ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value=500;
 gain.gain.value=0.1;
 osc.start();
 osc.stop(ctx.currentTime+0.05);
}

/* VOICE */
function speak(t){
 speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

/* LOGIN */
function login(){
 let user=document.getElementById("username").value;
 if(!user) return alert("Enter username");
 localStorage.setItem("skyro_user",user);
 document.getElementById("loginScreen").style.display="none";
 speak("Welcome "+user);
}

/* LOCK */
function lockSystem(){
 document.getElementById("loginScreen").style.display="flex";
 speak("System locked");
}

/* AUTO LOGIN */
window.onload=()=>{
 let user=localStorage.getItem("skyro_user");
 if(user){
  document.getElementById("loginScreen").style.display="none";
  speak("Welcome back "+user);
 }
};

/* EXTERNAL */
function openExternal(url,name){
 playClick();
 speak("Opening "+name);
 window.open(url,"_blank");
}

/* NOTES */
function openNotes(){
 playClick();
 speak("Opening Notes");

 let win=document.createElement("div");
 let id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Skyro Notes</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>
 <textarea id="notesArea" style="flex:1;background:black;color:cyan;"></textarea>
 <button onclick="saveNotes()">Save</button>
 `;

 document.getElementById("windows").appendChild(win);
 addTask(id,"Notes");
 drag(win);
 setTimeout(loadNotes,100);
}

function saveNotes(){
 localStorage.setItem("skyro_notes",document.getElementById("notesArea").value);
 speak("Saved");
}
function loadNotes(){
 let d=localStorage.getItem("skyro_notes");
 if(d) document.getElementById("notesArea").value=d;
}

/* TASKBAR */
function addTask(id,name){
 let t=document.createElement("div");
 t.className="task-item";
 t.innerText=name;
 t.onclick=()=>document.getElementById(id).style.display="block";
 document.getElementById("taskbar").appendChild(t);
}

/* CLOSE */
function closeApp(id){
 document.getElementById(id).remove();
}

/* DRAG */
function drag(el){
 let pos1=0,pos2=0,pos3=0,pos4=0;
 el.querySelector(".title-bar").onmousedown=e=>{
  pos3=e.clientX;pos4=e.clientY;
  document.onmousemove=dragMove;
  document.onmouseup=()=>document.onmousemove=null;
 };
 function dragMove(e){
  pos1=pos3-e.clientX;
  pos2=pos4-e.clientY;
  pos3=e.clientX;
  pos4=e.clientY;
  el.style.top=(el.offsetTop-pos2)+"px";
  el.style.left=(el.offsetLeft-pos1)+"px";
 }
}

/* TASKBAR TOGGLE */
document.getElementById("toggleTaskbar").onclick=()=>{
 let tb=document.getElementById("taskbar");
 tb.style.display = tb.style.display==="none"?"flex":"none";
};

/* BG ANIMATION */
let c=document.getElementById("bgCanvas");
let ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let p=[];
for(let i=0;i<50;i++){
 p.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}
function anim(){
 ctx.clearRect(0,0,c.width,c.height);
 p.forEach(pt=>{
  ctx.beginPath();
  ctx.arc(pt.x,pt.y,2,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();
  pt.x+=pt.dx;pt.y+=pt.dy;
 });
 requestAnimationFrame(anim);
}
anim();

/* MOUSE GLOW */
document.addEventListener("mousemove",e=>{
 let g=document.getElementById("glow");
 g.style.left=e.clientX+"px";
 g.style.top=e.clientY+"px";
});

/* VOICE COMMAND */
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
 let rec=new SR();
 document.getElementById("micBtn").onclick=()=>{
  speak("Listening");
  rec.start();
 };
 rec.onresult=e=>{
  let c=e.results[0][0].transcript.toLowerCase();
  if(c.includes("flipkart")) openExternal("https://flipkart.com","Flipkart");
  else if(c.includes("maps")) openExternal("https://maps.google.com","Maps");
  else if(c.includes("instagram")) openExternal("https://instagram.com","Instagram");
  else if(c.includes("aws")) openExternal("https://aws.amazon.com","AWS");
  else if(c.includes("bgmi")) openExternal("https://bgmi.in","BGMI");
  else if(c.includes("notes")) openNotes();
  else if(c.includes("cricket")) openExternal("https://cricbuzz.com","Cricbuzz");
  else speak("Command not recognized");
 };
}
</script>

</body>
</html>
