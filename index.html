<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: cyan;
  overflow: hidden;
}

/* BOOT SCREEN */
#boot-screen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  z-index: 9999;
  animation: fadeOut 2.5s ease forwards;
  animation-delay: 2s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* HEADER */
.header {
  text-align: center;
  padding: 10px;
}

/* CARDS */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  height: 110px;
  background: #111;
  border: 2px solid cyan;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 0 10px cyan;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px cyan;
}

/* WINDOWS */
.window {
  position: absolute;
  width: 90%;
  height: 70%;
  top: 60px;
  left: 5%;
  background: rgba(0,0,0,0.95);
  border: 2px solid cyan;
  display: flex;
  flex-direction: column;
  border-radius: 10px;
}

.title-bar {
  background: cyan;
  color: black;
  padding: 6px;
  display: flex;
  justify-content: space-between;
  cursor: move;
}

iframe {
  flex: 1;
  border: none;
}

/* TASKBAR */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 45px;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  padding: 5px;
}

.task-item {
  margin-right: 10px;
  padding: 5px 10px;
  background: cyan;
  color: black;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="boot-screen">Initializing SKYRO...</div>

<!-- HEADER -->
<div class="header">
  <h2>SKYRO | BY SHASWAT</h2>
  <p style="color:gray;">appnexus . your digital citadel</p>
</div>

<!-- CARDS -->
<div class="container">
  <div class="card" onclick="openApp('https://google.com','Chrome')">Chrome</div>
  <div class="card" onclick="openApp('https://chat.openai.com','ChatGPT')">ChatGPT</div>
  <div class="card" onclick="openApp('https://cricbuzz.com','Cricbuzz')">Cricbuzz</div>
  <div class="card" onclick="openApp('https://flipkart.com','Flipkart')">Flipkart</div>
  <div class="card" onclick="openApp('https://youtube.com','YouTube')">YouTube</div>
  <div class="card" onclick="openApp('https://github.com','GitHub')">GitHub</div>
  <div class="card" onclick="openApp('https://aws.amazon.com/console','AWS Console')">AWS</div>
  <div class="card" onclick="openNotes()">Notes</div>
</div>

<div id="windows"></div>
<div id="taskbar"></div>

<script>
let zIndex = 1;
let appCount = 0;

/* BUILT-IN CLICK SOUND */
function playClick() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.frequency.value = 600;
  gainNode.gain.value = 0.1;

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.05);
}

/* VOICE */
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  window.speechSynthesis.speak(speech);
}

/* WELCOME (mobile safe) */
window.onload = () => {
  setTimeout(() => {
    speak("Welcome to Skyro by Shaswat");
  }, 2000);
};

/* OPEN APP */
function openApp(url, title) {

  playClick();
  speak("Opening " + title);

  const win = document.createElement("div");
  const id = "app" + (++appCount);

  win.className = "window";
  win.id = id;
  win.style.zIndex = zIndex++;

  win.innerHTML = `
    <div class="title-bar">
      <span>${title}</span>
      <div>
        <span onclick="minimizeApp('${id}')">—</span>
        <span onclick="closeApp('${id}')">X</span>
      </div>
    </div>
    <iframe src="${url}"></iframe>
  `;

  document.getElementById("windows").appendChild(win);
  addToTaskbar(id, title);
  dragElement(win);
}

/* NOTES */
function openNotes() {
  playClick();
  speak("Opening Notes");

  const win = document.createElement("div");
  const id = "app" + (++appCount);

  win.className = "window";
  win.id = id;

  win.innerHTML = `
    <div class="title-bar">
      <span>Notes</span>
      <div>
        <span onclick="minimizeApp('${id}')">—</span>
        <span onclick="closeApp('${id}')">X</span>
      </div>
    </div>
    <textarea style="flex:1;background:black;color:cyan;border:none;padding:10px;"></textarea>
  `;

  document.getElementById("windows").appendChild(win);
  addToTaskbar(id, "Notes");
  dragElement(win);
}

/* TASKBAR */
function addToTaskbar(id, title) {
  const item = document.createElement("div");
  item.className = "task-item";
  item.innerText = title;

  item.onclick = () => {
    const app = document.getElementById(id);
    app.style.display = "block";
    app.style.zIndex = zIndex++;
  };

  document.getElementById("taskbar").appendChild(item);
}

/* MINIMIZE */
function minimizeApp(id) {
  document.getElementById(id).style.display = "none";
}

/* CLOSE */
function closeApp(id) {
  document.getElementById(id)?.remove();
}

/* DRAG */
function dragElement(elmnt) {
  let pos1=0,pos2=0,pos3=0,pos4=0;
  const header = elmnt.querySelector(".title-bar");

  header.onmousedown = function(e) {
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmousemove = drag;
    document.onmouseup = () => document.onmousemove = null;
  };

  function drag(e) {
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;

    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }
}
</script>

</body>
</html>
