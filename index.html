<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYRO OS ULTRA</title>

<style>
body{
 margin:0;
 font-family:Segoe UI;
 background:black;
 color:cyan;
 overflow:hidden;
}

/* BOOT */
#boot{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:99999;
 animation:fadeOut 3s forwards;
 animation-delay:2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* LOGIN */
#loginScreen{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:9999;
}

/* CANVAS */
#bgCanvas{
 position:fixed;
 width:100%;
 height:100%;
 z-index:-2;
}

/* ENERGY GRID */
#energyLines::before{
 content:"";
 position:fixed;
 width:100%;
 height:100%;
 background:repeating-linear-gradient(
  0deg,
  transparent,
  transparent 40px,
  rgba(0,255,255,0.05) 41px
 );
 pointer-events:none;
 z-index:-1;
}

/* HEADER */
.header{text-align:center;margin-top:10px;}

/* CARDS */
.container{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 height:140px;
 border-radius:18px;
 backdrop-filter: blur(20px);
 background: rgba(0,0,0,0.5);
 border:1px solid rgba(255,255,255,0.1);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 gap:10px;
 cursor:pointer;
 transition:0.3s;
}

.card img{width:50px;height:50px;}

.card:hover{
 transform:translateY(-5px) scale(1.05);
 box-shadow:0 10px 40px rgba(0,255,255,0.6);
}

/* WINDOW */
.window{
 position:absolute;
 width:90%;
 height:70%;
 top:60px;
 left:5%;
 backdrop-filter:blur(20px);
 background:rgba(0,0,0,0.6);
 border:1px solid rgba(0,255,255,0.4);
 border-radius:14px;
 display:flex;
 flex-direction:column;
 animation:openApp 0.3s ease;
}
@keyframes openApp{
 from{transform:scale(0.7);opacity:0;}
 to{transform:scale(1);opacity:1;}
}

.title-bar{
 background:cyan;
 color:black;
 padding:5px;
 display:flex;
 justify-content:space-between;
 cursor:move;
}

/* DOCK */
#dock{
 position:fixed;
 bottom:10px;
 left:50%;
 transform:translateX(-50%);
 display:flex;
 gap:10px;
 background:rgba(0,0,0,0.5);
 padding:10px;
 border-radius:20px;
 backdrop-filter:blur(10px);
}

.dock-item{
 width:50px;height:50px;
 background:cyan;
 border-radius:10px;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 transition:0.3s;
}
.dock-item:hover{
 transform:scale(1.3);
 box-shadow:0 0 20px cyan;
}

/* MIC */
#micBtn{
 position:fixed;
 right:20px;
 bottom:90px;
 width:60px;
 height:60px;
 border-radius:50%;
 background:black;
 border:2px solid cyan;
 color:cyan;
 cursor:pointer;
 animation:pulse 2s infinite;
}
@keyframes pulse{
 0%{box-shadow:0 0 10px cyan;}
 50%{box-shadow:0 0 40px cyan;}
 100%{box-shadow:0 0 10px cyan;}
}

/* GLOW */
#glow{
 position:fixed;
 width:250px;height:250px;
 background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
 pointer-events:none;
}
</style>
</head>

<body>

<div id="boot"><h1>SKYRO OS</h1><p>Initializing...</p></div>

<div id="loginScreen">
<h2>Login</h2>
<input id="username" placeholder="Enter Username">
<button onclick="login()">Enter</button>
</div>

<canvas id="bgCanvas"></canvas>
<div id="energyLines"></div>
<div id="glow"></div>

<div class="header">
<h2>SKYRO</h2>
<p>Appnexus Interface</p>
</div>

<div class="container">

<div class="card" onclick="openExternal('https://flipkart.com','Flipkart')">
<img src="https://img.icons8.com/color/96/flipkart.png">
<span>Flipkart</span>
</div>

<div class="card" onclick="openExternal('https://maps.google.com','Maps')">
<img src="https://img.icons8.com/color/96/google-maps.png">
<span>Maps</span>
</div>

<div class="card" onclick="openExternal('https://instagram.com','Instagram')">
<img src="https://img.icons8.com/color/96/instagram-new.png">
<span>Instagram</span>
</div>

<div class="card" onclick="openExternal('https://aws.amazon.com','AWS')">
<img src="https://img.icons8.com/color/96/amazon-web-services.png">
<span>AWS</span>
</div>

<div class="card" onclick="openExternal('https://bgmi.in','BGMI')">
<img src="https://img.icons8.com/color/96/controller.png">
<span>BGMI</span>
</div>

<div class="card" onclick="openNotes()">
<img src="https://img.icons8.com/color/96/note.png">
<span>Notes</span>
</div>

<div class="card" onclick="openExternal('https://cricbuzz.com','Cricbuzz')">
<img src="https://img.icons8.com/color/96/cricket.png">
<span>Cricbuzz</span>
</div>

</div>

<div id="dock">
<div class="dock-item" onclick="openNotes()">📝</div>
<div class="dock-item" onclick="lockSystem()">🔒</div>
<div class="dock-item" onclick="location.reload()">🔄</div>
</div>

<button id="micBtn">🎤</button>

<div id="windows"></div>

<script>
let appCount=0;

/* SOUND */
function playClick(){
 let ctx=new AudioContext();
 let osc=ctx.createOscillator();
 let gain=ctx.createGain();
 osc.connect(gain);
 gain.connect(ctx.destination);
 osc.frequency.value=500;
 gain.gain.value=0.1;
 osc.start();
 osc.stop(ctx.currentTime+0.05);
}

/* VOICE */
function speak(t){
 let msg=new SpeechSynthesisUtterance(t);
 msg.pitch=1.2;
 speechSynthesis.speak(msg);
}

/* LOGIN */
function login(){
 let u=username.value;
 if(!u) return alert("Enter username");
 localStorage.setItem("user",u);
 loginScreen.style.display="none";
 speak("Welcome "+u);
}

/* LOCK */
function lockSystem(){
 loginScreen.style.display="flex";
}

/* EXTERNAL */
function openExternal(url,name){
 playClick();
 speak("Opening "+name);
 window.open(url,"_blank");
}

/* NOTES */
function openNotes(){
 let win=document.createElement("div");
 let id="app"+(++appCount);

 win.className="window";
 win.id=id;

 win.innerHTML=`
 <div class="title-bar">
  <span>Notes</span>
  <span onclick="closeApp('${id}')">X</span>
 </div>
 <textarea id="notesArea" style="flex:1;background:black;color:cyan;"></textarea>
 <button onclick="saveNotes()">Save</button>
 `;

 document.body.appendChild(win);
 drag(win);
 setTimeout(loadNotes,100);
}

function saveNotes(){
 localStorage.setItem("notes",notesArea.value);
 speak("Saved");
}
function loadNotes(){
 let d=localStorage.getItem("notes");
 if(d) notesArea.value=d;
}

/* DRAG */
function drag(el){
 let pos1=0,pos2=0,pos3=0,pos4=0;
 el.querySelector(".title-bar").onmousedown=e=>{
  pos3=e.clientX;pos4=e.clientY;
  document.onmousemove=dragMove;
  document.onmouseup=()=>document.onmousemove=null;
 };
 function dragMove(e){
  pos1=pos3-e.clientX;
  pos2=pos4-e.clientY;
  pos3=e.clientX;
  pos4=e.clientY;
  el.style.top=(el.offsetTop-pos2)+"px";
  el.style.left=(el.offsetLeft-pos1)+"px";
 }
}

/* BG PARTICLES */
let canvas=document.getElementById("bgCanvas");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<150;i++){
 p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,size:Math.random()*2,sx:(Math.random()-0.5),sy:(Math.random()-0.5)});
}

function animate(){
 ctx.fillStyle="rgba(0,0,0,0.3)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 p.forEach(pt=>{
  ctx.beginPath();
  ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);
  ctx.fillStyle="cyan";
  ctx.fill();

  pt.x+=pt.sx;
  pt.y+=pt.sy;

  if(pt.x<0||pt.x>canvas.width) pt.sx*=-1;
  if(pt.y<0||pt.y>canvas.height) pt.sy*=-1;
 });

 requestAnimationFrame(animate);
}
animate();

/* GLOW */
document.addEventListener("mousemove",e=>{
 glow.style.left=e.clientX+"px";
 glow.style.top=e.clientY+"px";
});

/* VOICE */
let SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(SR){
 let rec=new SR();
 micBtn.onclick=()=>{speak("Listening");rec.start();};
 rec.onresult=e=>{
  let c=e.results[0][0].transcript.toLowerCase();
  if(c.includes("flipkart")) openExternal("https://flipkart.com","Flipkart");
  else if(c.includes("maps")) openExternal("https://maps.google.com","Maps");
  else if(c.includes("instagram")) openExternal("https://instagram.com","Instagram");
  else if(c.includes("aws")) openExternal("https://aws.amazon.com","AWS");
  else if(c.includes("bgmi")) openExternal("https://bgmi.in","BGMI");
  else if(c.includes("notes")) openNotes();
  else speak("Command not recognized");
 };
}
</script>

</body>
</html>
